<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MoveMuse | Dance Song Lab</title>
    <meta
      name="description"
      content="춤 모션을 읽고 실시간으로 가장 어울리는 음악 분위기로 전환하는 웹 기반 인터랙티브 스테이지"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" defer></script>
    <script src="./youtube-library.js" defer></script>
    <script src="./script.js" defer></script>
  </head>
  <body>
    <div class="page-shell">
      <div class="ambient ambient-one"></div>
      <div class="ambient ambient-two"></div>

      <main class="page">
        <h1 class="page-title">The DJ Who Loves Me</h1>

        <section class="stage-card" id="live-stage">
          <div class="stage-header">
            <p class="section-kicker">Live Stage</p>
            <div class="chip subtle" id="stabilityStatus">포즈 안정도 대기</div>
          </div>

          <div class="status-strip" aria-hidden="true">
            <div class="status-chip" id="cameraStatus">카메라 연결 대기</div>
            <div class="status-chip" id="moodStatus">무드 분석 대기</div>
            <div class="status-chip status-chip-accent" id="energyStatus">에너지 0%</div>
          </div>

          <div class="control-bar">
            <button id="captureButton" class="action-button primary" type="button">실시간 반응 시작</button>
            <button id="stopAudioButton" class="action-button" type="button">음악 정지</button>
            <div class="chip subtle" id="captureStatus">무대 대기 중</div>
            <p class="control-note">팁: 두 팔로 X 포즈를 만들고 2초 유지하면 즉시 정지됩니다.</p>
          </div>

          <div class="camera-shell">
            <div class="camera-overlay camera-overlay-top">
              <span class="overlay-tag overlay-tag-live">
                <span class="live-indicator" id="liveIndicatorDot" aria-hidden="true"></span>
                <span>Live Pose Feed</span>
              </span>
              <span class="overlay-tag overlay-tag-soft">Music Follows Motion</span>
            </div>
            <video id="cameraFeed" playsinline muted></video>
            <canvas id="poseCanvas" width="960" height="720"></canvas>
          </div>

          <div class="metric-grid">
            <article class="metric-card metric-card-style">
              <span>Detected Style</span>
              <strong id="detectedMood">대기</strong>
            </article>
            <article class="metric-card metric-card-candidate">
              <span>Switch Candidate</span>
              <div class="metric-inline">
                <strong id="candidateMood">없음</strong>
                <small id="candidateTimer">현재 장르 유지 중</small>
              </div>
            </article>
            <article class="metric-card metric-card-motion">
              <span>Motion Character</span>
              <strong id="motionType">준비 중</strong>
            </article>
            <article class="metric-card metric-card-value">
              <span>Body Openness</span>
              <strong id="opennessValue">0%</strong>
            </article>
            <article class="metric-card metric-card-value">
              <span>Bounce</span>
              <strong id="bounceValue">0%</strong>
            </article>
          </div>
        </section>

        <section class="youtube-panel" id="youtubePanel" hidden>
          <div class="youtube-panel-head">
            <p class="section-kicker">Playback</p>
            <div class="chip subtle" id="playerSource">생성 음악</div>
          </div>
          <div class="youtube-frame-wrap">
            <div id="youtubeFrame"></div>
          </div>
        </section>
      </main>
    </div>
  </body>
</html>
